name: CI-CD Cloud Run Dev

on:
  push:
    branches:
      - "**"

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'directed-relic-489223-a2' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  AR_REPOSITORY: ${{ vars.AR_REPOSITORY || 'store-backend-service-dev' }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'store-backend-service' }}

jobs:
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: make test-unit

  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start integration stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS "http://localhost:8000/health" > /tmp/health.json; then
              cat /tmp/health.json
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "API failed to become healthy in time"
              docker compose ps
              exit 1
            fi
            sleep 2
          done

      - name: Run integration tests
        run: make test-integration

      - name: Print logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop integration stack
        if: always()
        run: docker compose down --remove-orphans

  terraform_plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    env:
      IMAGE_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      TF_JWT_SECRET: ${{ secrets.TF_VAR_JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required CI/CD configuration
        run: |
          set -euo pipefail
          test -n "${{ secrets.GCP_WIF_PROVIDER }}" || { echo "::error::Missing secret GCP_WIF_PROVIDER"; exit 1; }
          test -n "${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}" || { echo "::error::Missing secret GCP_WIF_SERVICE_ACCOUNT"; exit 1; }
          test -n "${{ secrets.TF_BACKEND_BUCKET }}" || { echo "::error::Missing secret TF_BACKEND_BUCKET"; exit 1; }
          test -n "${{ secrets.TF_BACKEND_PREFIX }}" || { echo "::error::Missing secret TF_BACKEND_PREFIX"; exit 1; }
          test -n "${{ secrets.TF_VAR_JWT_SECRET }}" || { echo "::error::Missing secret TF_VAR_JWT_SECRET"; exit 1; }
          echo "Using IMAGE_URI=${IMAGE_URI}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform
        run: |
          set -euo pipefail
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="prefix=${{ secrets.TF_BACKEND_PREFIX }}"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: |
          set -euo pipefail
          terraform plan \
            -var-file=envs/dev.tfvars \
            -var="container_image=${IMAGE_URI}" \
            -var="jwt_secret=${TF_JWT_SECRET}"

  docker_build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t local-ci:${{ github.sha }} .

  deploy_dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: [unit_tests, integration_tests, terraform_plan, docker_build]
    if: github.ref == 'refs/heads/main' && needs.unit_tests.result == 'success' && needs.integration_tests.result == 'success' && needs.terraform_plan.result == 'success' && needs.docker_build.result == 'success'
    env:
      IMAGE_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      TF_JWT_SECRET: ${{ secrets.TF_VAR_JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required CI/CD configuration
        run: |
          set -euo pipefail
          test -n "${{ secrets.GCP_WIF_PROVIDER }}" || { echo "::error::Missing secret GCP_WIF_PROVIDER"; exit 1; }
          test -n "${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}" || { echo "::error::Missing secret GCP_WIF_SERVICE_ACCOUNT"; exit 1; }
          test -n "${{ secrets.TF_BACKEND_BUCKET }}" || { echo "::error::Missing secret TF_BACKEND_BUCKET"; exit 1; }
          test -n "${{ secrets.TF_BACKEND_PREFIX }}" || { echo "::error::Missing secret TF_BACKEND_PREFIX"; exit 1; }
          test -n "${{ secrets.TF_VAR_JWT_SECRET }}" || { echo "::error::Missing secret TF_VAR_JWT_SECRET"; exit 1; }
          echo "Using IMAGE_URI=${IMAGE_URI}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          set -euo pipefail
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Terraform init
        working-directory: terraform
        run: |
          set -euo pipefail
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="prefix=${{ secrets.TF_BACKEND_PREFIX }}"

      - name: Terraform apply
        working-directory: terraform
        run: |
          set -euo pipefail
          terraform apply -auto-approve \
            -var-file=envs/dev.tfvars \
            -var="container_image=${IMAGE_URI}" \
            -var="jwt_secret=${TF_JWT_SECRET}"

      - name: Read Cloud Run URL
        id: tf_output
        working-directory: terraform
        run: |
          set -euo pipefail
          service_url="$(terraform output -raw cloud_run_service_url)"
          echo "service_url=${service_url}" >> "${GITHUB_OUTPUT}"

      - name: Verify deployed health endpoint
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "${{ steps.tf_output.outputs.service_url }}/health" > health.json
          cat health.json
          python - <<'PY'
          import json

          with open("health.json", "r", encoding="utf-8") as file_handle:
              payload = json.load(file_handle)

          assert payload == {"status": "ok"}, payload
          print("Cloud Run health check passed")
          PY
